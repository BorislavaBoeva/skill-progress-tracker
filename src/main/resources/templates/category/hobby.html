<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--/*@thymesVar id="activityDto" type="app.model.entity.dto.activity.ActivityDto"*/-->
<!--/*@thymesVar id="activitySelectDto" type="app.model.entity.dto.activity.ActivitySelectDto"*/-->
<!--/*@thymesVar id="activities" type="java.util.List<app.model.entity.dto.activity.ActivityDto>"*/-->
<!--/*@thymesVar id="category" type="app.model.entity.category.Category"*/-->
<!--/*@thymesVar id="activities" type="java.util.List<app.model.entity.dto.activity.ActivityDto>"*/-->
<!-- @thymesVar id="activitySelectDto" type="app.model.entity.dto.activity.ActivitySelectDto" -->
<!-- @thymesVar id="skillProgressDto" type="app.model.entity.dto.skill.SkillProgressDto" -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobby Activities</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/form.css">
    <link rel="stylesheet" type="text/css" href="/css/profile.css">
    <link rel="stylesheet" type="text/css" href="/css/category.css">
</head>
<body>
<header>
    <div class="logo-left">
        <a href="/home">
            <img src="/images/logo.png" alt="Logo">
        </a>
    </div>
    <h3 class="title-center">Hobby Activities</h3>
</header>
<main>
    <div th:if="${param.error}" class="error">
        <p th:if="${param.error[0] == 'exists'}">This activity already exists</p>
    </div>
    <div th:if="${param.success}" class="success">
        <p>Activity added successfully</p>
    </div>
    <div th:if="${param.deleted}" class="success">
        <p>Activity deleted successfully</p>
    </div>

    <div class="forms-wrapper">
        <!-- Form to ADD activity -->
        <form th:action="@{/activity/add}" th:object="${activityDto}" method="post" class="form form-add">
            <input type="hidden" name="categoryId" th:value="${category.id}"/>
            <label for="name">Add New Activity</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Enter activity name"/>
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            <button type="submit" class="profile-actions-button">Add</button>
        </form>

        <!-- Form: List activities + Delete -->
        <form th:action="@{/activity/delete}" method="post" class="form form-delete">
            <div class="form-group">
                <label for="activityDeleteSelect">Delete Activity</label>
                <select id="activityDeleteSelect" name="id" class="form-select">
                    <option value="" disabled selected>Select activity to delete</option>
                    <option th:each="activity : ${activities}"
                            th:text="${activity.name}"
                            th:value="${activity.id}">
                    </option>
                </select>
            </div>
            <input type="hidden" name="categoryId" th:value="${category.id}">

            <button type="submit" class="profile-actions-button">Delete</button>
        </form>
    </div>

    <div class="forms-wrapper wrapper-select">
        <!-- UPDATE-SELECT ACTIVITY FORM -->
        <form th:action="@{/activity/select}" th:object="${activitySelectDto}" method="post" class="form form-choose">
            <div class="form-group">
                <label for="activitySelect">Choose activity</label>
                <select id="activitySelect" th:field="*{id}" class="form-select">
                    <option value="" disabled selected>Select</option>
                    <option th:each="activity : ${activities}"
                            th:text="${activity.name}"
                            th:value="${activity.id}">
                    </option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('id')}" th:errors="*{id}">
                    <p th:each="error : ${#fields.errors('id')}" th:text="${error}"></p>
                </div>
            </div>
            <!-- <input type="hidden" th:field="*{categoryId}" th:value="${category.id}"/>-->
            <input type="hidden" name="categoryId" th:value="${category.id}"/>
            <button type="submit" class="profile-actions-button">Select</button>
        </form>
    </div>

    <!-- LOG PROGRESS FORM -->
    <div th:if="${skillProgressDto != null}" class="form form-log">
        <form th:action="@{/activity/log}" method="post" th:object="${skillProgressDto}">

            <!-- activityId идва от Select -->
            <input type="hidden" th:field="*{activityId}"/>
            <input type="hidden" th:field="*{categoryId}"/>

            <div class="form-group">
                <label for="hours">Hours:</label>
                <input type="number" id="hours" th:field="*{hours}" min="1" required>
                <div class="error" th:if="${#fields.hasErrors('hours')}"
                     th:errors="*{hours}"></div>
            </div>

            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" th:field="*{description}" required></textarea>
                <div class="error" th:if="${#fields.hasErrors('description')}"
                     th:errors="*{description}"></div>
            </div>

            <button type="submit" class="submit-btn">Save</button>
        </form>
    </div>
</main>
<footer class="footer">© Skill Progress Tracker. All rights reserved.</footer>
</body>
</html>
