<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&amp;display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/form.css">
    <title>SkillProgress</title>
</head>
<body>
<header>
    <div class="logo-right">
        <a href="/">
            <img src="/images/logo.png" alt="Logo">
        </a>
    </div>
   </header>
<main>
    <form class="form skill-form" action="/skill-progress/add" method="post">
        <h3>Add Skill Progress</h3>

        <label for="activityTypeId">Choose activity:</label>
        <select id="activityTypeId" name="activityTypeId" required>
            <option value="">-- Select activity --</option>

            <optgroup label="Education">
                <option value="1">Reading</option>
                <option value="2">Course</option>
                <option value="3">Practice</option>
            </optgroup>

            <optgroup label="Physical">
                <option value="4">Yoga</option>
                <option value="5">Bicycle</option>
                <option value="6">Fitness</option>
            </optgroup>

            <optgroup label="Hobby">
                <option value="7">Drawing</option>
                <option value="8">PetWorking</option>
                <option value="9">Reading</option>
            </optgroup>

            <optgroup label="Professional">
                <option value="10">Communication</option>
                <option value="11">Presentation</option>
                <option value="12">Seminar</option>
            </optgroup>
        </select>

        <label for="hours">Hours:</label>
        <input type="number" id="hours" name="hours" min="1" required>

        <label for="description">Description:</label>
        <textarea id="description" name="description" required></textarea>

        <button type="submit" class="submit-btn">Add</button>
    </form>
</main>
<footer class="footer">
    © Skill Progress Tracker. All rights reserved.
</footer>
</body>
</html>
