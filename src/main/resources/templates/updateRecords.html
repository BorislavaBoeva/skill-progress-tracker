<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Export Record</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/form.css">
    <link rel="stylesheet" type="text/css" href="/css/profile.css">
    <link rel="stylesheet" type="text/css" href="/css/export.css">
</head>
<body>
<header>
    <div class="logo-left">
        <a href="/home"><img src="/images/logo.png" alt="Logo"></a>
    </div>
</header>
<main>
    <h2>Update Details</h2>
    <div class="home-section">
        <form class="form"
              th:if="${record != null}"
              th:action="@{/exportRecord/update/{id}(id=${record.id})}"
              method="post">
            <input type="hidden" name="_method" value="put"/>
            <!-- Editable fields -->
            <label for="fileName">File Name</label>
            <input id="fileName" name="fileName" type="text"
                   th:value="${record != null ? record.fileName : ''}" placeholder="File Name">

            <label for="description">Description</label>
            <input id="description" name="description" type="text"
                   th:value="${record != null ? record.description : ''}" placeholder="Description">

            <label for="exportType">Format</label>
            <input id="exportType" type="text"
                   th:value="${record != null ? record.exportType : ''}" disabled>
            <input type="hidden" name="exportType"
                   th:value="${record != null ? record.exportType : ''}"/>

            <button type="submit" class="profile-actions-button">Save Changes</button>
        </form>
        <div class="profile-actions">
            <a th:if="${record != null}"
               th:href="@{/exportRecord/details/{id}(id=${record.id})}"
               class="profile-actions-button">Cancel</a>
        </div>
    </div>
</main>
<footer class="footer">©Skill Progress Tracker. All rights reserved.</footer>
</body>
</html>
