<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Export Record</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/form.css">
    <link rel="stylesheet" type="text/css" href="/css/profile.css">
    <link rel="stylesheet" type="text/css" href="/css/export.css">
</head>
<body>
<header>
    <div class="logo-left">
        <a href="/home">
            <img src="/images/logo.png" alt="Logo">
        </a>
    </div>
    <div class="profile-header">
        <h2 class="profile-name">Edit Export Record</h2>
        <img src="/images/reports.png" alt="Export Icon" class="profile-avatar">
    </div>
</header>
<main>
    <div class="home-section">
        <!-- SUCCESS / ERROR MESSAGE -->
        <p th:if="${param.updated}" class="alert-success">✔ Export record updated successfully!</p>
        <p th:if="${param.error}" class="alert-warning" th:text="${param.error}"></p>
        <!-- UPDATE FORM -->
        <form class="form"
              th:action="@{/exportRecord/update/{id}(id=${record.id})}"
              method="post">
            <input type="hidden" name="_method" value="put"/>
            <!-- Editable fields -->
            <label for="fileName">File Name</label>
            <input id="fileName" name="fileName" type="text"
                   th:value="${record.fileName}" placeholder="File Name">
            <label for="description">Description</label>
            <input id="description" name="description" type="text"
                   th:value="${record.description}" placeholder="Description">
            <label for="exportType">Format</label>
            <input id="exportType" name="exportType" type="text"
                   th:value="${record.exportType}" placeholder="CSV / PDF">
            <!-- Disabled system fields -->
            <label for="status">Status</label>
            <input id="status" type="text" th:value="${record.exportStatus}" disabled>
            <label for="createdOn">Created On</label>
            <input id="createdOn" type="text"
                   th:value="${#temporals.format(record.exportDate, 'yyyy-MM-dd HH:mm')}"
                   disabled>
            <label for="updatedOn">Last Updated</label>
            <input id="updatedOn" type="text"
                   th:value="${#temporals.format(record.updatedOn, 'yyyy-MM-dd HH:mm')}"
                   disabled>
            <button type="submit" class="profile-actions-button">Save Changes</button>
        </form>
        <!-- ACTION BUTTONS -->
        <div class="profile-actions">
            <!-- Download -->
            <a th:if="${record.exportStatus.name() == 'SUCCEEDED'}"
               th:href="@{/exportRecord/download/{id}(id=${record.id})}"
               class="profile-actions-button">Download File</a>
            <!-- Delete -->
            <form th:action="@{/exportRecord/delete/{id}(id=${record.id})}" method="post" style="display:inline;">
                <button type="submit" class="profile-actions-button delete-btn">Delete Record</button>
            </form>
            <!-- Back -->
            <a th:href="@{/exportRecord/details/{id}(id=${record.id})}"
               class="profile-actions-button">Back to Details</a>
        </div>
    </div>
</main>
</body>
</html>
