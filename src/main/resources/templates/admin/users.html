<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/admin.css">
</head>
<body>
<header>
    <div class="logo-left">
        <a href="/home">
            <img src="/images/logo.png" alt="Logo">
        </a>
    </div>
     <div sec:authorize="isAuthenticated()">
        Logged in as: <span sec:authentication="name"></span>
    </div>
</header>
<main>
    <h2>Manage Users</h2>
    <div th:if="${param.deleted}" class="success">User deleted successfully</div>
    <div th:if="${param.error}" class="error" th:text="${param.error[0]}"></div>

    <table>
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Actions</th>
            <th>Delete</th>
        </tr>
        <tr th:each="user : ${users}">
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.role}"></td>
            <td>

                <form th:action="@{/admin/users/{id}/status(id=${user.id})}" method="post"
                      th:if="${user.role.name() != 'ADMIN'}">
                    <input type="hidden" name="_method" value="PUT"/>
                    <button type="submit"
                            th:text="${user.enabled} ? 'Deactivate' : 'Activate'"
                            th:class="${user.enabled} ? 'status-btn active' : 'status-btn inactive'">
                    </button>
                </form>
            </td>
           <td>
                <form th:action="@{/admin/users/delete}" method="post"
                      th:if="${user.role.name() != 'ADMIN'}">
                    <input type="hidden" name="id" th:value="${user.id}"/>
                    <button type="submit" class="delete-btn">Delete</button>
                </form>
            </td>
        </tr>
    </table>
</main>
</body>
</html>
