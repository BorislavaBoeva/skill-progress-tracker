<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Progress</title>
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/form.css">
    <link rel="stylesheet" type="text/css" href="/css/home.css">
    <link rel="stylesheet" type="text/css" href="/css/progress.css">
</head>
<body>
<header>
    <div class="logo-left">
        <a href="/home"><img src="/images/logo.png" alt="Logo"></a>
    </div>
</header>
<main>
    <h2>Your Progress, <span th:text="${firstName}"></span></h2>
    <div class="progress-wrapper">
        <article th:each="cat : ${progress.categories}"
                 class="progress-item"
                 th:classappend="${cat.categoryName}">
            <h3>
                <span th:text="${#strings.toUpperCase(cat.categoryName)}"></span>
                — <span class="level-text" th:text="${cat.level}"></span>
            </h3>
            <progress max="300" th:value="${cat.points}"></progress>
            <p>Points: <strong th:text="${cat.points}"></strong></p>

            <details th:if="${not #lists.isEmpty(cat.activities)}">
                <summary>Activities</summary>
                <ul class="activity-list">
                    <li th:each="act : ${cat.activities}">
                        <span th:text="${act.activityName}"></span>
                        — <strong th:text="${act.hours} + ' h'"></strong>
                    </li>
                </ul>
            </details>

            <p th:if="${#lists.isEmpty(cat.activities)}">No activities yet.</p>
        </article>
    </div>
    <a href="/home" class="button">EXPORT TO CV</a>
</main>
<footer class="footer">
    © Skill Progress Tracker. All rights reserved.
</footer>
</body>
</html>
